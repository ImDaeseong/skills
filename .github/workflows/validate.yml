name: Validate skills

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate workspace
        shell: powershell
        run: |
          $asOfDate = [TimeZoneInfo]::ConvertTimeBySystemTimeZoneId([DateTime]::UtcNow, 'Korea Standard Time').Date
          ./scripts/validate_workspace.ps1 -AsOfDate $asOfDate
      - name: Check local Markdown links
        shell: powershell
        run: ./scripts/validate_links.ps1
